name: Automated Preprocessing Pipeline

on:
  push:
    branches:
      - main
      - develop

  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Verify dataset exists
      - name: Verify dataset
        run: |
          ls -la dataset_raw
          test -f dataset_raw/heart.csv

      # Run preprocessing
      - name: Run preprocessing pipeline
        run: |
          python preprocessing/automate_Valina-Puspita-Sari.py

      # Verify outputs
      - name: Verify outputs
        run: |
          ls -la preprocessing/dataset_preprocessing

          test -f preprocessing/dataset_preprocessing/train.csv
          test -f preprocessing/dataset_preprocessing/val.csv
          test -f preprocessing/dataset_preprocessing/test.csv

      # Upload processed datasets
      - name: Upload processed datasets
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-datasets
          path: preprocessing/dataset_preprocessing/

      # Upload EDA results
      - name: Upload EDA results
        uses: actions/upload-artifact@v4
        with:
          name: eda-results
          path: preprocessing/eda_output/

      # Summary
      - name: Pipeline Summary
        run: |
          echo "=================================="
          echo " PREPROCESSING SUCCESS"
          echo "=================================="

          echo "Files generated:"
          ls -la preprocessing/dataset_preprocessing

          echo ""
          echo "EDA generated:"
          ls -la preprocessing/eda_output || true
